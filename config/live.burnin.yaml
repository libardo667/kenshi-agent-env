version: 1
mode: live

paths:
  runs_dir: ../runs
  prompt_file: ../prompts/planner_system.md
  memory_db: ${LOCALAPPDATA}/KenshiAgent/state/live-memory.sqlite3

runtime:
  max_steps: 30
  settle_seconds: 0.75
  observation_memory_limit: 16
  stop_when_terminated: true
  decision_stream: true
  objective: Locate and approach a clearly non-hostile trader in The Hub so Lekko can buy one affordable food item. Stay paused between actions and stop at any dialogue or trade UI that has not yet been calibrated.

planner:
  kind: openai
  model: ${KENSHI_AGENT_MODEL:-gpt-5.6-luna}
  reasoning_effort: ${KENSHI_AGENT_REASONING_EFFORT:-xhigh}
  openrouter_model: ${KENSHI_AGENT_OPENROUTER_MODEL:-openai/gpt-5.6-luna}
  openrouter_provider_sort: ${KENSHI_AGENT_OPENROUTER_SORT:-latency}
  temperature: 0.1
  timeout_seconds: 90
  include_screenshot: true
  screenshot_detail: high
  max_observation_chars: 30000

telemetry:
  file: ${KENSHI_AGENT_TELEMETRY_DIR:-$LOCALAPPDATA/KenshiAgent}/telemetry.latest.json
  max_age_seconds: 3.0
  read_retries: 4
  retry_delay_seconds: 0.04
  require_protocol_major: 0

capture:
  enabled: true
  window_title_contains: Kenshi 1.0.
  image_format: png
  jpeg_quality: 90
  crop_client_area: true

controls:
  pause_key: space
  pause_skill: pause_game
  unpause_skill: unpause_game
  speed_keys:
    1: f2
    2: f3
    3: f4
  focus_before_input: true
  post_input_delay_seconds: 0.10
  polite_input_enabled: true
  idle_seconds_before_input: 1.25
  max_wait_for_input_turn_seconds: 60
  restore_foreground_after_input: true
  restore_cursor_after_input: true
  alt_tab_after_input: true
  # Kenshi ignores absolute cursor teleports while it owns the mouse. Small
  # relative SendInput corrections keep its drawn cursor synchronized.
  pointer_mode: relative
  relative_pointer_max_step_pixels: 12
  relative_pointer_tolerance_pixels: 1
  relative_pointer_settle_seconds: 0.006
  relative_pointer_max_attempts: 500

safety:
  # This profile permits only the audited skills below. The CLI must still
  # receive --execute-live-actions before any input is sent.
  live_actions_enabled: true
  require_cli_execute_flag: true
  emergency_stop_key: f12
  max_primitive_actions_per_step: 4
  max_actions_per_minute: 40
  max_wait_seconds: 8.0
  block_clicks_when_telemetry_stale: true
  allow_live_unpause_actions: false
  allow_action_kinds:
    - noop
    - stop
    - pause
    - wait
    - skill
  allow_skills:
    - open_map
    - zoom_map_in
    - zoom_map_out
    - open_inventory
    - pause_game
    - recenter_camera
    - close_overlay
    - clear_item_highlights
    - pan_camera_forward
    - pan_camera_backward
    - pan_camera_left
    - pan_camera_right
    - orbit_camera_left
    - orbit_camera_right
    - move_visible_terrain
    - move_on_map
    - interact_visible_person

memory:
  enabled: true
  run_namespace: live-burnin
  max_recalled_memories: 16
  minimum_salience: 0.2

macros:
  pause_game:
    description: Click Kenshi's visible Pause transport button.
    visual_precondition: The normal bottom HUD is visible and its transport controls are unobstructed.
    normalized_pointer_bounds:
      min_x: 0.75
      max_x: 0.78
      min_y: 0.70
      max_y: 0.75
    actions:
      - kind: click
        x: 0.765
        y: 0.723
        space: normalized
        button: left
  unpause_game:
    description: Click Kenshi's visible Play transport button.
    visual_precondition: The normal bottom HUD is visible and its transport controls are unobstructed.
    normalized_pointer_bounds:
      min_x: 0.78
      max_x: 0.805
      min_y: 0.70
      max_y: 0.75
    actions:
      - kind: click
        x: 0.792
        y: 0.723
        space: normalized
        button: left
  open_map:
    description: Open or close the map.
    actions:
      - kind: key
        key: m
  zoom_map_in:
    description: Zoom the open map in one bounded wheel step at the demonstrated safe canvas point.
    visual_precondition: The map is visibly open and the target below its town-information card is unobstructed.
    normalized_pointer_bounds:
      min_x: 0.51
      max_x: 0.56
      min_y: 0.49
      max_y: 0.53
    actions:
      - kind: scroll
        x: 0.534
        y: 0.505
        space: normalized
        notches: 1
  zoom_map_out:
    description: Zoom the open map out one bounded wheel step at the demonstrated safe canvas point.
    visual_precondition: The map is visibly open and the target below its town-information card is unobstructed.
    normalized_pointer_bounds:
      min_x: 0.51
      max_x: 0.56
      min_y: 0.49
      max_y: 0.53
    actions:
      - kind: scroll
        x: 0.534
        y: 0.505
        space: normalized
        notches: -1
  open_inventory:
    description: Open or close inventory.
    actions:
      - kind: key
        key: i
  recenter_camera:
    description: Recenter the fixed-distance follow camera on the currently selected squad member with Kenshi's F binding.
    visual_precondition: The normal 3D world HUD is visible, Lekko is selected, and no modal overlay is open.
    actions:
      - kind: key
        key: f
        hold_seconds: 0.04
  close_overlay:
    description: Close the currently visible map, inventory, or other dismissible overlay.
    actions:
      - kind: key
        key: escape
  clear_item_highlights:
    description: Clear a stuck world-item highlight state with one complete Left Alt press and release.
    visual_precondition: The normal 3D world HUD is visible and item-name labels remain visible even though Alt is not physically held.
    actions:
      - kind: key
        key: alt
        hold_seconds: 0.04
  pan_camera_forward:
    description: Recenter on Lekko with F, then pan the paused fixed-distance camera forward one bounded step with W.
    visual_precondition: The normal 3D world HUD is visible, Lekko is selected, and no modal overlay is open.
    actions:
      - kind: key
        key: f
        hold_seconds: 0.04
      - kind: key
        key: w
        hold_seconds: 0.08
  pan_camera_backward:
    description: Recenter on Lekko with F, then pan the paused fixed-distance camera backward one bounded step with S.
    visual_precondition: The normal 3D world HUD is visible, Lekko is selected, and no modal overlay is open.
    actions:
      - kind: key
        key: f
        hold_seconds: 0.04
      - kind: key
        key: s
        hold_seconds: 0.08
  pan_camera_left:
    description: Recenter on Lekko with F, then pan the paused fixed-distance camera left one bounded step with A.
    visual_precondition: The normal 3D world HUD is visible, Lekko is selected, and no modal overlay is open.
    actions:
      - kind: key
        key: f
        hold_seconds: 0.04
      - kind: key
        key: a
        hold_seconds: 0.08
  pan_camera_right:
    description: Recenter on Lekko with F, then pan the paused fixed-distance camera right one bounded step with D.
    visual_precondition: The normal 3D world HUD is visible, Lekko is selected, and no modal overlay is open.
    actions:
      - kind: key
        key: f
        hold_seconds: 0.04
      - kind: key
        key: d
        hold_seconds: 0.08
  orbit_camera_left:
    description: Recenter on Lekko with F, then orbit the paused fixed-distance camera left one bounded step with Q.
    visual_precondition: The normal 3D world HUD is visible, Lekko is selected, and no modal overlay is open.
    actions:
      - kind: key
        key: f
        hold_seconds: 0.04
      - kind: key
        key: q
        hold_seconds: 0.1
  orbit_camera_right:
    description: Recenter on Lekko with F, then orbit the paused fixed-distance camera right one bounded step with E.
    visual_precondition: The normal 3D world HUD is visible, Lekko is selected, and no modal overlay is open.
    actions:
      - kind: key
        key: f
        hold_seconds: 0.04
      - kind: key
        key: e
        hold_seconds: 0.1
  move_visible_terrain:
    description: Fine movement by right-clicking nearby visible terrain, advancing briefly, and returning paused.
    arguments:
      x: Normalized horizontal coordinate in the current Kenshi client screenshot.
      y: Normalized vertical coordinate in the current Kenshi client screenshot.
      duration_seconds: Movement time from 0.35 to 3.0 seconds; use shorter pulses near obstacles.
    visual_precondition: The map and other overlays are closed, and the target is visibly unobstructed terrain in the 3D world viewport.
    normalized_pointer_bounds:
      min_x: 0.15
      max_x: 0.85
      min_y: 0.15
      max_y: 0.65
    movement_pulse_seconds: 0.75
    movement_pulse_min_seconds: 0.35
    movement_pulse_max_seconds: 3.0
    actions:
      - kind: click
        x: "{{x}}"
        y: "{{y}}"
        space: normalized
        button: right
        hold_seconds: 0.12
  move_on_map:
    description: Gross movement by right-clicking the open map, closing it, advancing briefly, and returning paused.
    arguments:
      x: Normalized horizontal coordinate in the current Kenshi client screenshot.
      y: Normalized vertical coordinate in the current Kenshi client screenshot.
      duration_seconds: Movement time from 1.0 to 8.0 seconds; reserve long pulses for clear gross travel.
    visual_precondition: The map is visibly open, and the target is inside its map canvas rather than its tabs, frame, or scrollbars.
    normalized_pointer_bounds:
      min_x: 0.30
      max_x: 0.68
      min_y: 0.16
      max_y: 0.69
    movement_pulse_seconds: 2.0
    movement_pulse_min_seconds: 1.0
    movement_pulse_max_seconds: 8.0
    actions:
      - kind: click
        x: "{{x}}"
        y: "{{y}}"
        space: normalized
        button: right
        hold_seconds: 0.12
      - kind: key
        key: m
  interact_visible_person:
    description: Right-click one clearly non-hostile visible person to talk or approach for dialogue, advance briefly, and return paused.
    arguments:
      x: Normalized horizontal coordinate of the visible person's body in the 3D viewport.
      y: Normalized vertical coordinate of the visible person's body in the 3D viewport.
      duration_seconds: Approach time from 0.5 to 6.0 seconds; keep it short when already nearby.
    visual_precondition: The 3D world is visible with overlays closed, and the target is clearly a non-hostile shopkeeper or person with a talk affordance. Never use on an ambiguous or hostile target because right-click may attack.
    normalized_pointer_bounds:
      min_x: 0.10
      max_x: 0.90
      min_y: 0.12
      max_y: 0.70
    movement_pulse_seconds: 2.0
    movement_pulse_min_seconds: 0.5
    movement_pulse_max_seconds: 6.0
    actions:
      - kind: click
        x: "{{x}}"
        y: "{{y}}"
        space: normalized
        button: right
        hold_seconds: 0.12
