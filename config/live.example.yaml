version: 1
mode: live

control:
  mode: interface_only
  native_assisted_actions_enabled: false

planning:
  mode: single_step
  observation_pump_enabled: true
  observation_pump_seconds: 0.1
  state_history_limit: 128
  state_delta_limit: 128
  event_journal_limit: 256
  subscriber_queue_limit: 32
  max_delta_paths: 128
  max_plan_steps: 4
  max_actions_per_plan: 8
  max_plan_wall_seconds: 30
  max_plan_game_seconds: 12
  max_pointer_actions_per_plan: 8
  max_purchase_actions_per_plan: 1
  max_native_assisted_actions_per_plan: 0
  max_consecutive_replans: 3

paths:
  runs_dir: ../runs
  prompt_file: ../prompts/planner_system.md
  # Keep SQLite on a Windows-local filesystem; WAL locking is unreliable over
  # the WSL UNC boundary even though screenshots and JSONL logs work there.
  memory_db: ${LOCALAPPDATA}/KenshiAgent/state/live-memory.sqlite3

runtime:
  max_steps: 200
  settle_seconds: 0.75
  observation_memory_limit: 16
  stop_when_terminated: true

planner:
  kind: openai
  model: ${KENSHI_AGENT_MODEL:-gpt-5.6-luna}
  reasoning_effort: ${KENSHI_AGENT_REASONING_EFFORT:-low}
  openrouter_model: ${KENSHI_AGENT_OPENROUTER_MODEL:-openai/gpt-5.6-luna}
  openrouter_provider_sort: ${KENSHI_AGENT_OPENROUTER_SORT:-latency}
  temperature: 0.1
  timeout_seconds: 90
  include_screenshot: true
  screenshot_detail: high
  max_observation_chars: 30000

mock:
  seed: 7
  start_location: The Hub
  start_cats: 180
  start_hunger: 250.0
  start_food_items: 1
  start_first_aid_kits: 1
  minutes_per_wait_second: 1.0
  random_events: true

telemetry:
  file: ${KENSHI_AGENT_TELEMETRY_DIR:-$LOCALAPPDATA/KenshiAgent}/telemetry.latest.json
  max_age_seconds: 3.0
  read_retries: 4
  retry_delay_seconds: 0.04
  require_protocol_major: 0

capture:
  enabled: true
  # Narrow enough not to match a terminal opened in the kenshi-agent-env repo.
  window_title_contains: Kenshi 1.0.
  image_format: png
  jpeg_quality: 90
  crop_client_area: true

controls:
  pause_key: space
  speed_keys:
    1: f2
    2: f3
    3: f4
  focus_before_input: true
  post_input_delay_seconds: 0.10
  polite_input_enabled: true
  idle_seconds_before_input: 1.25
  max_wait_for_input_turn_seconds: 60
  restore_foreground_after_input: true
  restore_cursor_after_input: true
  alt_tab_after_input: true

safety:
  # Keep false through telemetry and screenshot validation. Turning this true
  # is necessary but not sufficient: the CLI also requires
  # --execute-live-actions.
  live_actions_enabled: false
  require_cli_execute_flag: true
  emergency_stop_key: f12
  max_primitive_actions_per_step: 10
  max_actions_per_minute: 60
  max_wait_seconds: 8.0
  block_clicks_when_telemetry_stale: true
  allow_action_kinds:
    - noop
    - stop
    - pause
    - set_speed
    - wait
    - key
    - hotkey
    - click
    - move_cursor
    - skill
  allow_skills:
    - pause_game
    - open_map
    - open_inventory
    - focus_selected

memory:
  enabled: true
  run_namespace: live
  max_recalled_memories: 16
  minimum_salience: 0.2

macros:
  pause_game:
    description: Toggle pause through the normal interface.
    actions:
      - kind: key
        key: space
  open_map:
    description: Open or close the map.
    actions:
      - kind: key
        key: m
  open_inventory:
    description: Open or close inventory.
    actions:
      - kind: key
        key: i
  focus_selected:
    description: Select and center the first squad member by double-clicking the first squad portrait.
    visual_precondition: The normal world HUD is visible and the first squad portrait occupies its calibrated bottom portrait slot.
    normalized_pointer_bounds:
      min_x: 0.31
      max_x: 0.39
      min_y: 0.84
      max_y: 0.97
    actions:
      - kind: click
        x: 0.349
        y: 0.906
        space: normalized
        button: left
        clicks: 2
